<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algorithms Visualization</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <header>
        <div class="header-inner">
            <div class="logo">
                <span class="logo-bracket">[</span>
                <span class="logo-text">Algorithms Visualization</span>
                <span class="logo-bracket">]</span>
            </div>
            <p class="tagline">See how each algorithm works visually</p>
        </div>
    </header>

    <main>
        <section class="card">

            <div class="section-label">section 01 - Choose algorithms</div>
            <div id="algo-buttons">
                <!-- this div will contain mutiple options of algorithms -->
                <button class="algo-btn" data-algo="bubble">
                    <span class="algo-name">Bubble Sort</span>
                    <span class="algo-complexity">O(n²)</span>
                </button>
                <button class="algo-btn" data-algo="insertion">
                    <span class="algo-name">Insertion Sort</span>
                    <span class="algo-complexity">O(n²)</span>
                </button>
                <button class="algo-btn" data-algo="selection">
                    <span class="algo-name">Selection Sort</span>
                    <span class="algo-complexity">O(n²)</span>
                </button>
                <button class="algo-btn" data-algo="merge">
                    <span class="algo-name">Merge Sort</span>
                    <span class="algo-complexity">O(n log n)</span>
                </button>
                <button class="algo-btn" data-algo="quick">
                    <span class="algo-name">Quick Sort</span>
                    <span class="algo-complexity">O(n log n)</span>
                </button>
            </div>

            <div id="selection-hint">You can select up to 2 algorithms</div>

            <div class="section-label" style="margin-top:28px">section 02 - Configurations</div>
            <div id="controls">
                <!-- this div will contain mutiple options of control configurations -->
                <div class="control-group">
                    <label class="ctrl-label">Array size <span id="sizeOut" class="ctrl-val">20</span></label>
                    <input type="range" id="sizeSlider" min="6" max="40" value="20" step="1" />
                </div>
                <div class="control-group">
                    <label class="ctrl-label">Speed <span id="speedOut" class="ctrl-val">5</span></label>
                    <input type="range" id="speedSlider" min="1" max="10" value="5" step="1" />
                </div>
                <div class="control-group">
                    <label class="ctrl-label">Mode</label>
                    <div class="mode-toggle">
                        <button class="mode-btn active" id="modeAuto">Auto</button>
                        <button class="mode-btn" id="modeStep">Step</button>
                    </div>
                </div>
            </div>
            <div>
                <!-- this div will contain mutiple options of action configurations -->
                <div id="action-bar">
                    <button class="action-btn secondary" id="genBtn">↺ New Array</button>
                    <button class="action-btn primary" id="runBtn" disabled>▶ Run</button>
                    <button class="action-btn secondary" id="pauseBtn" disabled>⏸ Pause</button>
                    <button class="action-btn secondary" id="resetBtn">✕ Reset</button>
                </div>
                <div id="step-nav" style="display:none">
                    <button class="action-btn secondary" id="stepBack" disabled>← Prev</button>
                    <span id="stepCounter">Step 0 / 0</span>
                    <button class="action-btn secondary" id="stepFwd" disabled>Next →</button>
                </div>
            </div>

        </section>

        <div class="legend">
            <div class="leg"><span class="leg-dot" style="background:#4a9eff"></span>Default</div>
            <div class="leg"><span class="leg-dot" style="background:#ff5c5c"></span>Comparing</div>
            <div class="leg"><span class="leg-dot" style="background:#ffaa00"></span>Swapping</div>
            <div class="leg"><span class="leg-dot" style="background:#a78bfa"></span>Pivot / Active</div>
            <div class="leg"><span class="leg-dot" style="background:#4ade80"></span>Sorted</div>
        </div>

        <section id="visualizer-area"></section>
    </main>

    <script src="js/main.js"></script>
</body>

</html>
